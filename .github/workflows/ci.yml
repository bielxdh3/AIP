name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  phase-zero:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Install Python checks
        run: python -m pip install --disable-pip-version-check -e ".\services\runtime[dev]"

      - name: Validate public repository
        run: pnpm secrets:scan

      - name: Validate TypeScript and frontend
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Validate Python runtime
        run: pnpm python:check

      - name: Validate Rust and Tauri core
        run: pnpm tauri:check
