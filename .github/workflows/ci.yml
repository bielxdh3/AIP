name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  phase-zero:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Install Python checks
        run: python -m pip install --disable-pip-version-check -e ".\services\runtime[dev]"

      - name: Validate public repository
        run: pnpm secrets:scan

      - name: Validate TypeScript and frontend
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Validate Python runtime
        run: pnpm python:check

      - name: Validate Rust and Tauri core
        shell: pwsh
        run: |
          $output = & pnpm tauri:check 2>&1
          $exitCode = $LASTEXITCODE
          $output | ForEach-Object { Write-Output $_ }

          if ($exitCode -ne 0) {
            $tail = ($output | Select-Object -Last 80) -join "`n"
            $annotation = $tail.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Output "::error title=Rust and Tauri validation failed::$annotation"
            exit $exitCode
          }
